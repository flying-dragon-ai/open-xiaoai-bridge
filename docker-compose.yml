services:
  open-xiaoai-bridge:
    image: ghcr.io/coderzc/open-xiaoai-bridge:latest
    restart: unless-stopped
    ports:
      - "4399:4399"
      - "9092:9092"
    environment:
      - LOGLEVEL=INFO # 日志级别（DEBUG, INFO, WARNING, ERROR, CRITICAL）
      - API_SERVER_ENABLE=1 # 启用 HTTP API 服务（可选）
      - API_SERVER_HOST=0.0.0.0 # HTTP API 服务监听地址（默认监听 127.0.0.1）
      - OPENCLAW_ENABLED=1       # 启用 OpenClaw（可选）
      # - XIAOZHI_ENABLE=1       # 启用小智 AI（可选）
    volumes:
      - ./config.py:/app/config.py
      - ./openclaw:/app/openclaw
    stdin_open: true
    tty: true      
